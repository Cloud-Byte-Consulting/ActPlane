version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule no_dependency_detour:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "The search_notes tool should use existing Basic Memory search, schema, repository, service, and MCP tool patterns."

  rule search_notes_followthrough:
    notify open file "*search*.py" if AGENT
    notify open file "*async_client.py" if AGENT
    notify open file "*tools/__init__.py" if AGENT
    notify write file "*search*.py" if AGENT
    notify write file "*tools*search*.py" if AGENT
    notify write file "*repository*.py" if AGENT
    notify write file "*service*.py" if AGENT
    notify write file "*schema*.py" if AGENT
    notify write file "*tools/__init__.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "Complete the search_notes checklist: implement fuzzy title search, exact tag matching, pagination with default size 10, wire the MCP tool through schemas/repository/service/tool registration, use the async_client.get_client pattern, add focused tests, run pytest/ruff where practical, and summarize changed files plus validation status."

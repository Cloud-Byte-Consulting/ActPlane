version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule no_live_aws:
    notify exec "aws" if AGENT
    because "For this SQS/SNS parser task, do not call live AWS CLI commands; add parser/server code and local tests."

  rule no_dependency_detour:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "The SQS/SNS parser extension should use existing project patterns without installing packages."

  rule sqs_sns_followthrough:
    notify open file "*command_parser.py" if AGENT
    notify open file "*server.py" if AGENT
    notify open file "*tools.py" if AGENT
    notify write file "*command_parser.py" if AGENT
    notify write file "*server.py" if AGENT
    notify write file "*tools.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "Complete both requested services: add SQS command parsing, add SNS command parsing, expose SQS/SNS tool wrappers through the server/tools layer, preserve AWS command validation and timeout patterns, add pytest coverage for command strings, run ruff/pytest where practical, and summarize the SQS/SNS files changed."

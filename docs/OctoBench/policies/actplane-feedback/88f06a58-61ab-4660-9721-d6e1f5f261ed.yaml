version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule docs:
    notify write file "**/*.md" if AGENT
    notify write file "**/README*" if AGENT
    notify write file "**/docs/**" if AGENT
    because "Do not create documentation or Markdown files unless the task explicitly asks for documentation."

  rule destructive:
    notify exec "rm" if AGENT
    because "Avoid destructive file or command operations unless the task explicitly requires them and the target is confirmed."

  rule external_cli:
    notify exec "curl" if AGENT
    notify exec "wget" if AGENT
    notify exec "gh" if AGENT
    notify exec "stripe" if AGENT
    because "Avoid live external network or service CLI calls while implementing this repository task; use local tests or mocks."

  rule tool_workflow:
    notify exec "find" if AGENT
    notify exec "ls" if AGENT
    notify exec "grep" if AGENT
    notify exec "head" if AGENT
    notify exec "tail" if AGENT
    notify exec "sed" if AGENT
    notify exec "awk" if AGENT
    because "For this Astropy change, do not use Bash file/search/listing commands for repository exploration. Use Task(subagent_type=Explore), Glob, Grep, Read, and TodoWrite; keep the todo list current before editing."

  rule futurewarning_followthrough:
    notify write file "*table.py" if AGENT
    notify write file "*mixin*.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "After touching the structured ndarray Table/NdarrayMixin behavior, ensure the FutureWarning is in the exact conversion branch, current behavior is preserved, related tests are updated and run with pytest, unrelated failures are identified, and the final response summarizes file paths and test status."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule no_dependency_detour:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "The frontmatter normalization feature should use existing Basic Memory utilities and tests."

  rule normalize_frontmatter_followthrough:
    notify open file "*frontmatter*.py" if AGENT
    notify open file "*markdown*.py" if AGENT
    notify open file "*tools/__init__.py" if AGENT
    notify write file "*frontmatter*.py" if AGENT
    notify write file "*markdown*.py" if AGENT
    notify write file "*normalize*.py" if AGENT
    notify write file "*tools/__init__.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "Complete the normalize_frontmatter checklist: deduplicate aliases, normalize tags by lowercasing/trimming/deduplicating, place logic in the existing appropriate module, register or expose it where the task requires, add pytest cases for aliases/tags and edge cases, run pytest/ruff where practical, and summarize changed files plus validation status."

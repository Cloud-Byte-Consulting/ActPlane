version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule package:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "npm" "i" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "pnpm" "install" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "For this Astropy validators task, do not add dependencies; implement validate_shape, validate_dtype, and validate_range with existing Astropy/Numpy/Pytest tooling."

  rule validators_followthrough:
    notify open file "*/astropy/utils/**" if AGENT
    notify open file "*/astropy/utils/tests/**" if AGENT
    notify write file "*validation*.py" if AGENT
    notify write file "*validators*.py" if AGENT
    notify write file "*/astropy/utils/__init__.py" if AGENT
    notify write file "*/astropy/utils/tests/*" if AGENT
    because "For this Astropy validators task, continue until validate_shape, validate_dtype, and validate_range are real non-placeholder implementations under astropy/utils, exported from astropy.utils, covered by pytest tests under astropy/utils/tests, checked with a relevant pytest invocation when practical, and summarized with test status."

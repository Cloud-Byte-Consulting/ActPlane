version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule shell:
    notify exec "cat" if AGENT
    notify exec "find" if AGENT
    notify exec "grep" if AGENT
    notify exec "head" if AGENT
    notify exec "tail" if AGENT
    notify exec "sed" if AGENT
    notify exec "awk" if AGENT
    because "Prefer Claude Code Read/Grep/Glob tools for file inspection instead of shell file-inspection commands."

  rule aws_live:
    notify exec "aws" if AGENT
    because "Do not call live AWS CLI commands while implementing or testing this repository task; use validation logic, tests, or mocks."

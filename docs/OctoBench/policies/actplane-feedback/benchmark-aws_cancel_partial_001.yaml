version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule shell_completion:
    notify write file "**/.bashrc" if AGENT
    notify write file "**/.zshrc" if AGENT
    notify write file "**/completions/**" if AGENT
    because "Do not implement shell-level completion integration for this task; the requested scope excludes auto-completion."

  rule package:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "npm" "i" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "pnpm" "install" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "Do not install or add new package dependencies unless the task explicitly requires dependency changes."

  rule tool_workflow:
    notify exec "find" if AGENT
    notify exec "ls" if AGENT
    notify exec "grep" if AGENT
    notify exec "head" if AGENT
    notify exec "tail" if AGENT
    notify exec "sed" if AGENT
    notify exec "awk" if AGENT
    because "For this AWS MCP task, do not use Bash file/search/listing commands for repository exploration. Use Task(subagent_type=Explore), Glob, Grep, Read, and TodoWrite; keep todos updated while implementing history and aliases."

  rule history_alias_followthrough:
    notify write file "*server.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "After changing server.py or tests for this history/alias task, finish the checklist before stopping: implement only A history and C aliases, expose no shell completion, register get_command_history and list_command_aliases MCP tools, add focused tests, run python -m pytest and ruff check where practical, fix lint issues, and summarize paths and test status."

  rule server_registration_followthrough:
    notify open file "*server.py" if AGENT
    because "When reading server.py for this task, continue directly to complete MCP integration: add command history recording, alias resolution, get_command_history and list_command_aliases tools, avoid shell completion, then add focused tests and run pytest/ruff where practical."

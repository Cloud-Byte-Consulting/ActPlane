version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule implementation_after_pattern_reads:
    notify open file "*read_note.py" if AGENT
    notify open file "*write_note.py" if AGENT
    notify open file "*edit_note.py" if AGENT
    notify open file "*async_client.py" if AGENT
    notify open file "*tools/__init__.py" if AGENT
    notify open file "*pyproject.toml" if AGENT
    because "You have enough Basic Memory MCP pattern context. Implement export_note_pdf now: add a PDF dependency in pyproject.toml, create src/basic_memory/mcp/tools/export_note_pdf.py, read notes through the existing async_client/get_client path, preserve frontmatter title/date in the PDF header, support margin and font-size parameters, register the tool in tools/__init__.py, update project docs, add focused tests, and run pytest/ruff where practical."

  rule pip_install_detour:
    kill exec "pip" if AGENT
    because "Do not spend benchmark turns installing packages interactively. Add the PDF dependency to pyproject.toml and continue implementing export_note_pdf, registration, docs, tests, and final usage notes."

  rule pdf_export_followthrough:
    notify write file "*pyproject.toml" if AGENT
    notify write file "*export*pdf*.py" if AGENT
    notify write file "*tools/__init__.py" if AGENT
    notify write file "*CLAUDE.md" if AGENT
    notify write file "*README*" if AGENT
    notify write file "*test*.py" if AGENT
    because "After this PDF-export change, keep going until the checklist is covered: dependency added, export_note_pdf implemented, frontmatter title/date rendered as header, margins and font size configurable, MCP registration complete, docs updated, focused tests/checks run, and final usage example provided."

  rule external_cli:
    notify exec "curl" if AGENT
    notify exec "wget" if AGENT
    notify exec "gh" if AGENT
    notify exec "stripe" if AGENT
    because "Avoid live external network or service CLI calls while implementing this repository task; use local tests or mocks."

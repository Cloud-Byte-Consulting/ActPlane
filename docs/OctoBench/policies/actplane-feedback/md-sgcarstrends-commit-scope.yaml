version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule package_workflow:
    notify exec "npm" if AGENT
    notify exec "yarn" if AGENT
    notify exec "bun" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "pnpm" "install" if AGENT
    because "For this sgcarstrends homepage fix, use existing pnpm scripts for validation and avoid package/dependency detours."

  rule homepage_empty_data_followthrough:
    notify open file "*homepage*" if AGENT
    notify open file "*chart*" if AGENT
    notify open file "*brand*" if AGENT
    notify write file "*homepage*" if AGENT
    notify write file "*chart*" if AGENT
    notify write file "*brand*" if AGENT
    notify write file "*component*" if AGENT
    notify write file "*test*" if AGENT
    notify write file "*README*" if AGENT
    notify write file "*.md" if AGENT
    because "Complete the homepage empty-data checklist: locate crash points from real code, make data fetching defensive, handle undefined/null/empty arrays in homepage modules, preserve layout with empty states, avoid unrelated docs/refactors, use pnpm validation where practical, and summarize changed files plus validation status."

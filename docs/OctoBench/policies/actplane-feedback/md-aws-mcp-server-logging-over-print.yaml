version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule credential:
    notify open file "**/.aws/config" if AGENT
    notify open file "**/.aws/credentials" if AGENT
    because "Do not expose credentials or secret material; only inspect existence or validation status required by the task."

  rule aws_live:
    notify exec "aws" if AGENT
    because "Do not call live AWS CLI commands while implementing or testing this repository task; use validation logic, tests, or mocks."

  rule package:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "npm" "i" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "pnpm" "install" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "For this AWS command-validator task, avoid adding dependencies; implement validation rules, detailed errors, security audit logging, and tests with existing project code."

  rule validator_followthrough:
    notify open file "*cli_executor.py" if AGENT
    notify open file "*tools.py" if AGENT
    notify open file "*config.py" if AGENT
    notify open file "*test_cli_executor.py" if AGENT
    notify write file "*command_validator.py" if AGENT
    notify write file "*cli_executor.py" if AGENT
    notify write file "*server.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "For this AWS command-validator task, continue until the command_validator module covers starts-with-aws, injection metacharacters, safe pipe allowlist, dangerous rm/delete confirmation, detailed rejection reasons, security logging, integration into command execution, focused unit tests, and a final summary with test status."

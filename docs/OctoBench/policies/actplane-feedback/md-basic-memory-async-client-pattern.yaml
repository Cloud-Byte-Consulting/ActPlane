version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule direct_markdown_write:
    notify write file "*.md" if AGENT
    because "For normalize_frontmatter, read and update note markdown through the existing Basic Memory API/client helpers, not by directly opening or writing markdown files on disk."

  rule implementation_after_pattern_reads:
    notify open file "*read_note.py" if AGENT
    notify open file "*write_note.py" if AGENT
    notify open file "*edit_note.py" if AGENT
    notify open file "*async_client.py" if AGENT
    notify open file "*tools/__init__.py" if AGENT
    because "You have enough Basic Memory MCP/API pattern context. Stop broad exploration and implement normalize_frontmatter in src/basic_memory/mcp/tools/, register it in tools/__init__.py, use async_client/get_client for file content, add focused tests, run pytest/ruff where practical, and summarize behavior and test status."

  rule stop_extra_exploration:
    kill open file "*markdown_processor.py" if AGENT
    kill open file "*read_content.py" if AGENT
    kill open file "*knowledge.py" if AGENT
    kill open file "*entity_service.py" if AGENT
    kill open file "*sync_service.py" if AGENT
    because "Do not spend more turns on broad Basic Memory internals for this benchmark case. Use the already-read MCP tool and async_client patterns to implement normalize_frontmatter now, then register it, add tests, run pytest/ruff where practical, and summarize."

  rule normalize_followthrough:
    notify write file "*normalize_frontmatter.py" if AGENT
    notify write file "*tools/__init__.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "After changing normalize_frontmatter or tool registration/tests, verify date normalization to YYYY-MM-DD, lowercase type normalization, API-based read/update, path validation, result messages, pytest coverage, and final user summary."

  rule external_cli:
    notify exec "curl" if AGENT
    notify exec "wget" if AGENT
    notify exec "gh" if AGENT
    notify exec "stripe" if AGENT
    because "Avoid live external network or service CLI calls while implementing this repository task; use local tests or mocks."

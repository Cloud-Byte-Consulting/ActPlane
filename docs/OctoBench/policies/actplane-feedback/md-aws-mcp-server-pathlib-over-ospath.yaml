version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule credential:
    notify open file "**/.aws/config" if AGENT
    notify open file "**/.aws/credentials" if AGENT
    because "For this AWS config-loader task, never expose AWS credential values; only parse profile metadata from config and check whether matching credentials exist."

  rule aws_live:
    notify exec "aws" if AGENT
    because "Do not call live AWS CLI commands while implementing or testing this repository task; use validation logic, tests, or mocks."

  rule package:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "npm" "i" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "pnpm" "install" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "For this AWS config-loader task, do not add dependencies; implement config parsing, credential-existence checks, malformed-file handling, and tests with the Python standard library and existing project helpers."

  rule config_loader_followthrough:
    notify open file "*config.py" if AGENT
    notify open file "*server.py" if AGENT
    notify open file "*cli_executor.py" if AGENT
    notify open file "*test*.py" if AGENT
    notify write file "*config_loader.py" if AGENT
    notify write file "*config.py" if AGENT
    notify write file "*server.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "For this AWS config-loader task, continue until the implementation reads ~/.aws/config, parses all profiles including region/output/common fields, checks credential presence without returning secret values, handles missing files gracefully, reports malformed config clearly, adds focused unit tests, and summarizes behavior and test status."

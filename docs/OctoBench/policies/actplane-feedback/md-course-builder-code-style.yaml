version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule package:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "npm" "i" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "pnpm" "install" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "For this course-builder pricing task, do not add dependencies; implement stacked percentage-then-fixed discount calculation with existing TypeScript/Vitest tooling."

  rule stacked_discount_followthrough:
    notify open file "*determine-coupon-to-apply.ts" if AGENT
    notify open file "*get-calculated-price.ts" if AGENT
    notify open file "*bulk-coupon.ts" if AGENT
    notify open file "*coupon-schema.ts" if AGENT
    notify open file "*merchant-coupon-schema.ts" if AGENT
    notify open file "*stripe-checkout-stackable-discounts.test.ts" if AGENT
    notify write file "*determine-coupon-to-apply.ts" if AGENT
    notify write file "*get-calculated-price.ts" if AGENT
    notify write file "*bulk-coupon.ts" if AGENT
    notify write file "*coupon-schema.ts" if AGENT
    notify write file "*merchant-coupon-schema.ts" if AGENT
    notify write file "*discount*.test.ts" if AGENT
    notify write file "*coupon*.test.ts" if AGENT
    because "For this course-builder pricing task, continue until the official requirements are covered: support multiple percentage and fixed discounts, apply percentages before fixed amounts, clamp final price at zero, define complete TypeScript types, add focused unit tests for mixed/order/non-negative cases, run a relevant Vitest/core check when practical, and summarize changed files."

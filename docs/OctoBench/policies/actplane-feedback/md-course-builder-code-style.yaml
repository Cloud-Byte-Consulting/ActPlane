version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"
  source WORKSPACE_CONTEXT = file "/workspace/**"

  rule no-git-branch-or-worktree:
    kill exec "git" "branch" if AGENT
    kill exec "git" "worktree" if AGENT
    because "Do not create or inspect git branches/worktrees in this OctoBench workspace."

  rule no-unrequested-dependency-install:
    kill exec "pip" "install" if AGENT
    kill exec "uv" "add" if AGENT
    kill exec "uv" "pip" if AGENT
    kill exec "npm" "install" if AGENT
    kill exec "pnpm" "add" if AGENT
    kill exec "yarn" "add" if AGENT
    because "Do not add third-party dependencies unless the task explicitly requires dependency management."

  rule read-workspace-before-write:
    notify write file "/workspace/**" if AGENT and not WORKSPACE_CONTEXT
    because "Read relevant workspace files before editing or writing repository files."

  rule no-unrequested-doc-files:
    notify write file "**/*.md" if AGENT
    because "Do not create documentation files unless the task explicitly requests documentation."

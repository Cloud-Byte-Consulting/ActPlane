version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule no_dependency_detour:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "The frontmatter_guide prompt should use existing Basic Memory prompt/resource patterns without adding dependencies."

  rule frontmatter_guide_followthrough:
    notify open file "*frontmatter*.py" if AGENT
    notify open file "*parser*.py" if AGENT
    notify open file "*prompts*" if AGENT
    notify write file "*frontmatter*guide*.py" if AGENT
    notify write file "*frontmatter*guide*.md" if AGENT
    notify write file "*prompts*" if AGENT
    notify write file "*resources*" if AGENT
    notify write file "*test*.py" if AGENT
    because "Complete the frontmatter_guide checklist: inspect existing frontmatter parsing/date/tag logic first, implement the MCP prompt/resource under the existing prompts/resources pattern, include supported fields, formats, examples, and common errors, add tests that load the resource and check key sections, run pytest/ruff where practical, and summarize changed files plus validation status."

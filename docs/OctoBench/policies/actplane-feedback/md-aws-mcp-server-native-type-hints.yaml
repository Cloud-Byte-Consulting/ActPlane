version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "claude"

  rule no_live_aws:
    notify exec "aws" if AGENT
    because "For this command_parser task, do not call live AWS CLI commands; implement parser logic and local tests."

  rule no_dependency_detour:
    notify exec "pip" "install" if AGENT
    notify exec "pip3" "install" if AGENT
    notify exec "uv" "add" if AGENT
    notify exec "poetry" "add" if AGENT
    notify exec "npm" "install" if AGENT
    notify exec "pnpm" "add" if AGENT
    notify exec "yarn" "add" if AGENT
    notify exec "bun" "add" if AGENT
    because "The command_parser module should use Python standard-library parsing and existing project helpers."

  rule command_parser_followthrough:
    notify open file "*cli_executor.py" if AGENT
    notify open file "*tools.py" if AGENT
    notify open file "*command_parser.py" if AGENT
    notify write file "*command_parser.py" if AGENT
    notify write file "*cli_executor.py" if AGENT
    notify write file "*tools.py" if AGENT
    notify write file "*test*.py" if AGENT
    because "Complete the command_parser checklist: add an independent parser module, extract service/action/key-value args, support --key value and --key=value, identify pipe commands separately, reuse existing pipe helpers where possible, add pytest unit tests for examples and edge cases, run ruff/pytest where practical, and include structured-result examples in the final response."

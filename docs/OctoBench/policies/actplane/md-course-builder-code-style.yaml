version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "bash"

  rule no-shell-file-inspection:
    notify exec "cat" if AGENT
    notify exec "find" if AGENT
    notify exec "grep" if AGENT
    notify exec "head" if AGENT
    notify exec "tail" if AGENT
    notify exec "sed" if AGENT
    notify exec "awk" if AGENT
    because "Use dedicated file/search tools instead of shell file-inspection commands."

  rule no-unrequested-doc-files:
    notify write file "**/*.md" if AGENT
    because "Do not create documentation files unless the task explicitly requests documentation."

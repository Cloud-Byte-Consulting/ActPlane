case_id: benchmark-aws_lazy_validator_001
policy_intent:
  - id: validator_followthrough
    source: User query and Agents.md checklist
    mapped_checks:
      - UserQuery_aws_prefix_enforced
      - UserQuery_injection_chars_blocked
      - UserQuery_pipe_whitelist_enforced
      - UserQuery_dangerous_keywords_detected
      - Agents_test_coverage_for_new_logic
    os_effect: write
    enforcement:
      tool_regex: block live AWS/external commands and dependency detours
      actplane: notify on validator/executor/test writes with checklist feedback
  - id: no_live_aws
    source: AWS command-validation task safety
    mapped_checks:
      - Agents_security_validation
    os_effect: exec
    enforcement:
      tool_regex: block Bash aws invocations
      actplane: notify on aws exec
notes:
  - Official OctoBench reward remains unchanged and is the only score.
  - This file is case-specific; shared/base guardrails are intentionally not used.

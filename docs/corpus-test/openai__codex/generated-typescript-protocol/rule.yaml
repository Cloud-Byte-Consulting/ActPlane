# directive: "Do not modify generated TypeScript protocol files under `codex-rs/app-server-protocol/schema/typescript/v2/`; change the Rust protocol definitions under `codex-rs/app-server-protocol/src/protocol/v2/` and regenerate the TypeScript instead."
# repo: "openai__codex"
# statement_id: "generated-typescript-protocol"
# enforceability: "per_event"
# context_required: "project"
# notes: "Generated TypeScript protocol files are protected by path. Each write is
#   independently enforceable below the tool layer."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule generated-typescript-protocol:
    kill write file "codex-rs/app-server-protocol/schema/typescript/v2/**" if AGENT or AGENT_ALT
    because "Do not modify generated TypeScript protocol files under `codex-rs/app-server-protocol/schema/typescript/v2/`; change the Rust protocol definitions under `codex-rs/app-server-protocol/src/protocol/v2/` and regenerate the "

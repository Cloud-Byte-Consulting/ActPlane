# ActPlane rule for: safety-api-in-codebase
# Directive: Don't hardcode API keys/secrets in source code
# Pattern: data-flow IFC — if process reads .env (gets SECRET label),
#          writes to .py file should be blocked (prevent secret leakage)
version: 1
policy: |
  source AGENT = exec "claude"
  source SECRET = file "**/.env"

  rule no-hardcode-secret:
    kill write file "**/*.py" if SECRET
    because "Do not hardcode API keys or secrets in source code. Use os.environ or a config loader to read secrets at runtime."

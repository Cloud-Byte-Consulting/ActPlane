version: 1
rules:
- id: scripts-in-scripts-dir-sh
  effect: notify
  op: write
  pattern: (?s:(?>.*?/).*\.sh)\Z
  if: AGENT
  unless:
    pattern: (?s:(?>.*?/scripts/).*)\Z
  reason: Helper scripts must be placed in the scripts/ directory, not written inline; reference them from SKILL.md by relative
    path
- id: scripts-in-scripts-dir-py
  effect: notify
  op: write
  pattern: (?s:(?>.*?/).*\.py)\Z
  if: AGENT
  unless:
    pattern: (?s:(?>.*?/scripts/).*)\Z
  reason: Helper scripts must be placed in the scripts/ directory, not written inline; reference them from SKILL.md by relative
    path

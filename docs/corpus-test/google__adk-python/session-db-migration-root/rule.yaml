# directive: "Do not execute scripts/db_migration.sh from the repository root; run it only after changing into the intended sample or target database directory so generated alembic.ini and alembic/ files are scoped there."
# repo: "google__adk-python"
# statement_id: "session-db-migration-root"
# enforceability: "cwd-insensitive approximation for db_migration.sh execution"
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule session-db-migration-root:
    notify exec "scripts/db_migration.sh" if AGENT or AGENT_ALT
    notify exec "bash" "scripts/db_migration.sh" if AGENT or AGENT_ALT
    notify exec "sh" "scripts/db_migration.sh" if AGENT or AGENT_ALT
    because "Do not execute scripts/db_migration.sh from the repository root; run it only after changing into the intended sample or target database directory so generated alembic.ini and alembic/ files are scoped there."

# directive: "For normal PRs, direct main fixes, or ship-it work, do not edit CHANGELOG.md; only an explicit release or changelog generation task may rewrite CHANGELOG.md."
# repo: "openclaw__openclaw"
# statement_id: "release-changelog-protection"
# enforceability: "path-level changelog protection; cannot infer release intent"
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule release-changelog-protection:
    notify write file "CHANGELOG.md" if AGENT or AGENT_ALT
    because "For normal PRs, direct main fixes, or ship-it work, do not edit CHANGELOG.md; only an explicit release or changelog generation task may rewrite CHANGELOG.md."

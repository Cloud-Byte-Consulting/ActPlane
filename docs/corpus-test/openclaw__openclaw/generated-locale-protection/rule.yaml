# directive: "For ordinary UI copy and localization work, do not hand-edit generated non-English locale bundles under ui/src/i18n/locales/*.ts or ui/src/i18n/.i18n/*; update ui/src/i18n/locales/en.ts or generator/runtime wiring, then run pnpm ui:i18n:sync."
# repo: "openclaw__openclaw"
# statement_id: "generated-locale-protection"
# enforceability: "generated locale path policy"
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule generated-locale-protection:
    kill write file "ui/src/i18n/locales/*.ts" if AGENT or AGENT_ALT unless target "ui/src/i18n/locales/en.ts"
    kill write file "ui/src/i18n/.i18n/**" if AGENT or AGENT_ALT
    because "For ordinary UI copy and localization work, do not hand-edit generated non-English locale bundles under ui/src/i18n/locales/*.ts or ui/src/i18n/.i18n/*; update ui/src/i18n/locales/en.ts or generator/runtime wiring, then "

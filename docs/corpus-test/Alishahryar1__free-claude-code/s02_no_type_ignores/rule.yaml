# directive: "Do not add `# type: ignore` or `# ty: ignore` suppressions anywhere in the repo; fix the underlying type issue instead."
# repo: "Alishahryar1__free-claude-code"
# statement_id: "s02_no_type_ignores"
# enforceability: "content-semantic; neither OS layer nor current tool-regex observes Write/Edit content reliably"
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule s02_no_type_ignores:
    notify exec "__actplane_unobservable__" if AGENT or AGENT_ALT
    because "This directive is content/semantic and is intentionally left as a non-matching placeholder for OS-layer policy."

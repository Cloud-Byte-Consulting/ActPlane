# directive: "Read `.env.example` for environment variables."
# repo: "Alishahryar1__free-claude-code"
# statement_id: 6
# enforceability: "cross_event"
# context_required: "project"
# notes: "The directive instructs the agent to read .env.example for environment
#   variables. We model this as a data-flow rule: the agent should have read
#   .env.example (acquiring the ENV_AWARE label) before writing .env files. A notify
#   effect is used since this is advisory guidance, not a hard security boundary."
version: 1
policy: |
  source AGENT = exec "claude"
  source ENV_AWARE = file "**/.env.example"

  rule read-env-example:
    notify write file "**/.env" if AGENT and not ENV_AWARE
    because "Read .env.example before creating or modifying .env files to understand required environment variables"

version: 1
rules:
  - id: no-bare-python
    effect: kill
    op: exec
    target: "python"
    if: "AGENT"
    reason: "Run repo Python commands through uv run."
  - id: no-bare-python3
    effect: kill
    op: exec
    target: "python3"
    if: "AGENT"
    reason: "Run repo Python commands through uv run."
  - id: no-bare-pytest
    effect: kill
    op: exec
    target: "pytest"
    if: "AGENT"
    reason: "Run repo tests through uv run."

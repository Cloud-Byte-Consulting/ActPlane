# directive: "Always use `uv run` to run Python files, modules, tests, and repo scripts; do not invoke the global `python` or `python3` command directly."
# repo: "Alishahryar1__free-claude-code"
# statement_id: "s01_use_uv_run"
# enforceability: "cross_event"
# context_required: "project"
# notes: "Direct Python/test execution is blocked unless the process lineage has
#   passed through uv. This is OS-observable, but it requires cross-event lineage
#   state rather than a single exec decision."
version: 1
policy: |
  source AGENT = exec "__actplane_eval_seed__"
  source SHELL = exec "bash"

  rule s01_use_uv_run:
    kill exec "python" if AGENT and SHELL unless lineage-includes exec "uv"
    kill exec "python3" if AGENT and SHELL unless lineage-includes exec "uv"
    kill exec "pytest" if AGENT and SHELL unless lineage-includes exec "uv"
    because "Always use `uv run` to run Python files, modules, tests, and repo scripts; do not invoke the global `python` or `python3` command directly."

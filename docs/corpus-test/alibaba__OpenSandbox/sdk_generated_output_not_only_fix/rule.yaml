# directive: "Do not manually edit generated SDK output as the only fix; changes to generator-owned SDK API files must be accompanied by the source spec or handwritten layer update/regeneration path."
# repo: "alibaba__OpenSandbox"
# statement_id: "sdk_generated_output_not_only_fix"
# enforceability: "per_event"
# context_required: "project"
# notes: "Implemented as a path-level guard on generated SDK output writes. This
#   catches the OS-observable generated-output edit, but cannot prove whether a
#   matching source/spec update was also made."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule sdk_generated_output_not_only_fix:
    notify write file "sdks/sandbox/python/src/opensandbox/api/**" if AGENT or AGENT_ALT
    notify write file "sdks/sandbox/javascript/src/api/*.ts" if AGENT or AGENT_ALT
    notify write file "sdks/sandbox/kotlin/sandbox-api/build/generated/**" if AGENT or AGENT_ALT
    because "Do not manually edit generated SDK output as the only fix; changes to generator-owned SDK API files must be accompanied by the source spec or handwritten layer update/regeneration path."

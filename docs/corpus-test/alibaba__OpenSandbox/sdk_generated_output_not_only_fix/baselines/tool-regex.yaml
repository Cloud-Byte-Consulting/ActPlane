version: 1
rules:
- id: no-python-sdk-generated-only
  effect: notify
  op: write
  pattern: (?s:sdks/sandbox/python/src/opensandbox/api/.*)\Z
  if: AGENT
  reason: Do not manually patch generated SDK output as the only fix.
- id: no-js-sdk-generated-only
  effect: notify
  op: write
  pattern: (?s:sdks/sandbox/javascript/src/api/.*\.ts)\Z
  if: AGENT
  reason: Do not manually patch generated SDK output as the only fix.
- id: no-kotlin-sdk-generated-only
  effect: notify
  op: write
  pattern: (?s:sdks/sandbox/kotlin/sandbox\-api/build/generated/.*)\Z
  if: AGENT
  reason: Do not manually patch generated SDK output as the only fix.

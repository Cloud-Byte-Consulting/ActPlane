version: 1
rules:
- id: generate-after-k8s-api-write
  effect: notify
  op: exec
  pattern: (^|[;&|()\s])(?:[^\s;&|()]+/)?git(?=$|[;&|()\s])
  arg: (^|[;&|()\s])commit(?=$|[;&|()\s])
  if: AGENT
  unless:
    after_exec: (^|[;&|()\s])(?:[^\s;&|()]+/)?make(?=$|[;&|()\s])
    since_write:
    - (?s:kubernetes/apis/.*)\Z
  reason: Run Kubernetes manifests/generate after changing kubernetes/apis before committing.

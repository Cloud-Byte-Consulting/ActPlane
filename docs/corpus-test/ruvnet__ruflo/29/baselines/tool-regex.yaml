version: 1
rules:
- id: no-save-to-root
  effect: notify
  op: write
  tool: Write
  pattern: .*
  if: AGENT
  unless:
    pattern:
    - (?s:src/.*)\Z
    - (?s:tests/.*)\Z
    - (?s:docs/.*)\Z
    - (?s:config/.*)\Z
    - (?s:scripts/.*)\Z
  reason: Never save files to the root folder; use /src, /tests, /docs, /config, or /scripts instead

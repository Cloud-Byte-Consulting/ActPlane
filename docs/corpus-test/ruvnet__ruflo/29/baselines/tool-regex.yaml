version: 1
rules:
- id: no-save-to-root
  effect: notify
  op: write
  tool: Write
  pattern: .*
  if: AGENT
  unless:
    pattern:
    - (?:^|.*/)src/.*$
    - (?:^|.*/)tests/.*$
    - (?:^|.*/)docs/.*$
    - (?:^|.*/)config/.*$
    - (?:^|.*/)scripts/.*$
  reason: Never save files to the root folder; use /src, /tests, /docs, /config, or /scripts instead

version: 1
rules:
  - id: no-save-to-root
    effect: notify
    op: write
    tool: Write
    target: "**"
    if: AGENT
    unless:
      target:
        - "src/**"
        - "tests/**"
        - "docs/**"
        - "config/**"
        - "scripts/**"
    reason: "Never save files to the root folder; use /src, /tests, /docs, /config, or /scripts instead"

# directive: "Always read an existing repo file before editing or overwriting it; direct Edit, Write, or Bash modifications to an existing file without a prior Read of that same path are disallowed."
# repo: "ruvnet__ruflo"
# statement_id: "read-before-edit"
# enforceability: "cross_event"
# context_required: "project"
# notes: "A write is compliant only after a prior read labels the process. This is
#   OS-observable but requires cross-event read-before-write state."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule read-before-edit:
    notify write file "**/*" if AGENT or AGENT_ALT and not READ_ANY
    because "Always read an existing repo file before editing or overwriting it; direct Edit, Write, or Bash modifications to an existing file without a prior Read of that same path are disallowed."

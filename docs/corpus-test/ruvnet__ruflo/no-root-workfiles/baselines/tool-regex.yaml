version: 1
rules:
- id: no-root-md
  effect: notify
  op: write
  pattern: (?:^|.*/)[^/]*\.md$
  if: AGENT
  unless:
    pattern:
    - (?:^|.*/)docs/.*$
    - (?:^|.*/)tests/.*$
    - (?:^|.*/)src/.*$
    - (?:^|.*/)config/.*$
    - (?:^|.*/)scripts/.*$
    - (?:^|.*/)examples/.*$
  reason: Place working notes and drafts in an appropriate directory, not repo root.
- id: no-root-txt
  effect: notify
  op: write
  pattern: (?:^|.*/)[^/]*\.txt$
  if: AGENT
  unless:
    pattern:
    - (?:^|.*/)docs/.*$
    - (?:^|.*/)tests/.*$
    - (?:^|.*/)src/.*$
    - (?:^|.*/)config/.*$
    - (?:^|.*/)scripts/.*$
    - (?:^|.*/)examples/.*$
  reason: Place working files in an appropriate directory, not repo root.
- id: no-root-py
  effect: notify
  op: write
  pattern: (?:^|.*/)[^/]*\.py$
  if: AGENT
  unless:
    pattern:
    - (?:^|.*/)docs/.*$
    - (?:^|.*/)tests/.*$
    - (?:^|.*/)src/.*$
    - (?:^|.*/)config/.*$
    - (?:^|.*/)scripts/.*$
    - (?:^|.*/)examples/.*$
  reason: Place tests/helpers in an appropriate directory, not repo root.

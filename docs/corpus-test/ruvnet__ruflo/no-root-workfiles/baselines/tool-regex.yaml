version: 1
rules:
- id: no-root-md
  effect: notify
  op: write
  pattern: (?s:.*\.md)\Z
  if: AGENT
  unless:
    pattern:
    - (?s:docs/.*)\Z
    - (?s:tests/.*)\Z
    - (?s:src/.*)\Z
    - (?s:config/.*)\Z
    - (?s:scripts/.*)\Z
    - (?s:examples/.*)\Z
  reason: Place working notes and drafts in an appropriate directory, not repo root.
- id: no-root-txt
  effect: notify
  op: write
  pattern: (?s:.*\.txt)\Z
  if: AGENT
  unless:
    pattern:
    - (?s:docs/.*)\Z
    - (?s:tests/.*)\Z
    - (?s:src/.*)\Z
    - (?s:config/.*)\Z
    - (?s:scripts/.*)\Z
    - (?s:examples/.*)\Z
  reason: Place working files in an appropriate directory, not repo root.
- id: no-root-py
  effect: notify
  op: write
  pattern: (?s:.*\.py)\Z
  if: AGENT
  unless:
    pattern:
    - (?s:docs/.*)\Z
    - (?s:tests/.*)\Z
    - (?s:src/.*)\Z
    - (?s:config/.*)\Z
    - (?s:scripts/.*)\Z
    - (?s:examples/.*)\Z
  reason: Place tests/helpers in an appropriate directory, not repo root.

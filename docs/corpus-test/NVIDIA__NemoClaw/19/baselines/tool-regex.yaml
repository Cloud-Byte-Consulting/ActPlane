version: 1
sources:
  - label: CLI_CHANGE
    kind: file
    pattern: "**/src/lib/**"
    op: write
  - label: CLI_TEST
    kind: file
    pattern: "**/test/**"
    op: write
rules:
  - id: add-tests-for-cli-commands
    effect: notify
    op: exec
    target: git
    arg: commit
    if: AGENT and CLI_CHANGE and not CLI_TEST
    reason: "When adding or modifying CLI commands in src/lib/, you must also add corresponding tests in test/"

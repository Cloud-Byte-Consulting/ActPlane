version: 1
rules:
  - id: no-entrypoint-exec
    effect: kill
    op: exec
    target: "**/deploy/*/entrypoint.sh"
    if: "AGENT"
    reason: "Container entrypoints should only run as container ENTRYPOINT."
  - id: no-bash-entrypoint
    effect: kill
    op: exec
    target: "bash"
    arg: "*entrypoint.sh"
    if: "AGENT"
    reason: "Do not run deploy entrypoint scripts manually."
  - id: no-sh-entrypoint
    effect: kill
    op: exec
    target: "sh"
    arg: "*entrypoint.sh"
    if: "AGENT"
    reason: "Do not run deploy entrypoint scripts manually."

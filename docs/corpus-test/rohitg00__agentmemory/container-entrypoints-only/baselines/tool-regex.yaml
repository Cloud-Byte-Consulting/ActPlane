version: 1
rules:
- id: no-entrypoint-exec
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?>.*?/deploy/).*/entrypoint\.sh(?=$|[;&|()\s])
  if: AGENT
  reason: Container entrypoints should only run as container ENTRYPOINT.
- id: no-bash-entrypoint
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?:[^\s;&|()]+/)?bash(?=$|[;&|()\s])
  arg: (^|[;&|()\s]).*entrypoint\.sh(?=$|[;&|()\s])
  if: AGENT
  reason: Do not run deploy entrypoint scripts manually.
- id: no-sh-entrypoint
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?:[^\s;&|()]+/)?sh(?=$|[;&|()\s])
  arg: (^|[;&|()\s]).*entrypoint\.sh(?=$|[;&|()\s])
  if: AGENT
  reason: Do not run deploy entrypoint scripts manually.

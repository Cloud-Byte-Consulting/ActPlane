version: 1
sources:
  - label: AUDIT_CHANGE
    kind: file
    pattern: "**/src/functions/**"
    op: write
  - label: AUDIT_TYPES
    kind: file
    pattern: "**/src/types.ts"
    op: write
rules:
  - id: update-types-for-audit-ops
    effect: notify
    op: exec
    target: git
    arg: commit
    if: AGENT and AUDIT_CHANGE and not AUDIT_TYPES
    reason: "When adding new audit operations, you must also update src/types.ts to add the operation to the AuditEntry.operation union type"

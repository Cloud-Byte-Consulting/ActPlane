version: 1
rules:
  - id: test-before-commit
    effect: kill
    op: exec
    target: "git"
    arg: "commit"
    if: "AGENT"
    unless:
      after_exec: "**/prek"
      since_write:
        - "**/*.py"
        - "**/*.ts"
    reason: "Run uv run prek run --all-files after source edits and before committing."

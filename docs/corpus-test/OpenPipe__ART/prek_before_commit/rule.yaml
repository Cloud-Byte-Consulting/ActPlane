# directive: "Before creating a git commit, agents must run the full project check command `uv run prek run --all-files` in the same workflow. Creating a commit without that prior check is not allowed."
# repo: "OpenPipe__ART"
# statement_id: "prek_before_commit"
# enforceability: "cross_event"
# context_required: "project"
# notes: "A git commit decision depends on a prior prek run after source writes.
#   This is OS-observable, but it requires temporal state across events."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule prek_before_commit:
    kill exec "git" "commit" if AGENT or AGENT_ALT unless after exec "prek" since write "**/*.py" or write "**/*.ts"
    because "Before creating a git commit, agents must run the full project check command `uv run prek run --all-files` in the same workflow. Creating a commit without that prior check is not allowed."

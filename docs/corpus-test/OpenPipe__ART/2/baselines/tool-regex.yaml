version: 1
rules:
- id: test-before-commit
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?:[^\s;&|()]+/)?git(?=$|[;&|()\s])
  arg: (^|[;&|()\s])commit(?=$|[;&|()\s])
  if: AGENT
  unless:
    after_exec: (^|[;&|()\s]).*/prek(?=$|[;&|()\s])
    since_write:
    - (?s:(?>.*?/).*\.py)\Z
    - (?s:(?>.*?/).*\.ts)\Z
  reason: Tests are stale -- run 'uv run prek run --all-files' before committing; source files were edited after the last
    test run

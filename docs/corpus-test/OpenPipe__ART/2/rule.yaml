# directive: "Always run tests before committing. The test command is
#   `uv run prek run --all-files`."
# repo: "OpenPipe__ART"
# statement_id: 2
# enforceability: "cross_event"
# context_required: "project"
# notes: "The directive requires running tests (via prek) before committing. We use
#   the staleness-aware temporal gate: the commit is blocked unless prek has been
#   executed after the last write to source files (.py, .ts). The 'since' clause
#   re-arms the gate whenever source files change, ensuring tests must be re-run
#   after each edit. The kill effect terminates the git commit if the gate is stale."
version: 1
policy: |
  source AGENT = exec "claude"

  rule test-before-commit:
    kill exec "git" "commit" if AGENT unless after exec "**/prek" since write "**/*.py" or write "**/*.ts"
    because "Tests are stale -- run 'uv run prek run --all-files' before committing; source files were edited after the last test run"

version: 1
rules:
- id: no-bare-python
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?:[^;&|()\s]+/)?python(?=$|[;&|()\s])
  if: AGENT
  reason: Run repo Python commands through uv run.
- id: no-bare-python3

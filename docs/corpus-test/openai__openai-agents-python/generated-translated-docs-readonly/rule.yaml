# directive: "Do not modify generated translated documentation under docs/ja/, docs/ko/, or docs/zh/; make documentation changes in the corresponding source docs outside those generated translation directories."
# repo: "openai__openai-agents-python"
# statement_id: "generated-translated-docs-readonly"
# enforceability: "per_event"
# context_required: "project"
# notes: "Generated translated documentation paths are read-only for the agent.
#   Writes can be blocked independently by path."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule generated-translated-docs-readonly:
    kill write file "docs/ja/**" if AGENT or AGENT_ALT
    kill write file "docs/ko/**" if AGENT or AGENT_ALT
    kill write file "docs/zh/**" if AGENT or AGENT_ALT
    because "Do not modify generated translated documentation under docs/ja/, docs/ko/, or docs/zh/; make documentation changes in the corresponding source docs outside those generated translation directories."

version: 1
rules:
- id: no-ja-generated-docs
  effect: kill
  op: write
  pattern: (?:^|.*/)docs/ja/.*$
  if: AGENT
  reason: Do not edit generated translated docs; update source docs.
- id: no-ko-generated-docs
  effect: kill
  op: write
  pattern: (?:^|.*/)docs/ko/.*$
  if: AGENT
  reason: Do not edit generated translated docs; update source docs.
- id: no-zh-generated-docs
  effect: kill
  op: write
  pattern: (?:^|.*/)docs/zh/.*$
  if: AGENT
  reason: Do not edit generated translated docs; update source docs.

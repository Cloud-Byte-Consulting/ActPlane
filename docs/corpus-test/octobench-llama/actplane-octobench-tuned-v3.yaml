version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  # Action-oriented, low-noise OctoBench policy.
  #
  # Keep event frequency low, but make the corrective feedback useful for the
  # failure mode observed in the 3-case pilot: agents often inspect the repo and
  # then stop before editing/testing.

  source COMMAND = exec "bash"
  source WORKSPACE_CONTEXT = file "/workspace/**"

  rule warn-git-branch-or-worktree:
    notify exec "git" "branch" if COMMAND
    notify exec "git" "worktree" if COMMAND
    because "Stay in the provided benchmark workspace; do not create branches or worktrees. Continue by making the requested code edits in-place, running focused tests when possible, and summarizing the concrete changes."

  rule block-destructive-git:
    kill exec "git" "reset" if COMMAND
    kill exec "git" "clean" if COMMAND
    kill exec "git" "push" if COMMAND
    because "Destructive or remote git operations are outside these OctoBench implementation tasks."

  rule warn-dependency-install:
    notify exec "pip" "install" if COMMAND
    notify exec "uv" "add" if COMMAND
    notify exec "uv" "pip" if COMMAND
    notify exec "npm" "install" if COMMAND
    notify exec "pnpm" "add" if COMMAND
    notify exec "yarn" "add" if COMMAND
    because "Avoid adding dependencies unless the task explicitly requires dependency management; prefer implementing with existing project dependencies."

  rule warn-read-workspace-before-write:
    notify write file "/workspace/**" if COMMAND and not WORKSPACE_CONTEXT
    because "Read relevant workspace files before editing or writing repository files, then make the requested change in-place."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  # OctoBench OS-observable subset policy.
  #
  # Scope:
  # - maps only checklist items visible at syscall/process/file level
  # - intentionally excludes semantic/style/implementation-correctness checks
  # - setup commands should run outside `actplane run`; wrap only the scaffold
  #   agent command. `run_actplane_case.py` invokes `actplane ... run bash -c
  #   '<claude command>'`, so label that entry shell and rely on fork/exec
  #   propagation to cover Claude Code and its tool subprocesses.

  source COMMAND = exec "bash"
  source WORKSPACE_CONTEXT = file "/workspace/**"

  rule no-git-branch-or-worktree:
    kill exec "git" "branch" if COMMAND
    kill exec "git" "worktree" if COMMAND
    because "OctoBench scaffold policy forbids creating git branches or worktrees in this workspace."

  rule no-unnecessary-dependency-install:
    kill exec "pip" "install" if COMMAND
    kill exec "uv" "add" if COMMAND
    kill exec "uv" "pip" if COMMAND
    kill exec "npm" "install" if COMMAND
    kill exec "pnpm" "add" if COMMAND
    kill exec "yarn" "add" if COMMAND
    because "Do not add third-party dependencies for these OctoBench tasks unless the task explicitly requires dependency management."

  rule no-bash-file-inspection:
    kill exec "cat" if COMMAND
    kill exec "find" if COMMAND
    kill exec "grep" if COMMAND
    kill exec "head" if COMMAND
    kill exec "tail" if COMMAND
    kill exec "sed" if COMMAND
    kill exec "awk" if COMMAND
    kill exec "echo" if COMMAND
    because "Use the scaffold's dedicated file/search tools for file inspection instead of shell file-inspection commands."

  rule read-workspace-before-write:
    notify write file "/workspace/**" if COMMAND and not WORKSPACE_CONTEXT
    because "Read relevant workspace files before editing or writing repository files."

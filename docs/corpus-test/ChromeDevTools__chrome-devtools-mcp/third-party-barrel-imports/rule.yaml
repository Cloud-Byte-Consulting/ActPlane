# directive: "In src/**/*.ts, do not add runtime imports from third-party packages that are re-exported by src/third_party/index.ts; import runtime values from the local src/third_party/index.js barrel instead. Type-only imports and files under src/third_party/ are allowed."
# repo: "ChromeDevTools__chrome-devtools-mcp"
# statement_id: "third-party-barrel-imports"
# enforceability: "content-semantic import policy; current OS/tool layers cannot inspect inserted import text"
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule third-party-barrel-imports:
    notify exec "__actplane_unobservable__" if AGENT or AGENT_ALT
    because "This directive is content/semantic and is intentionally left as a non-matching placeholder for OS-layer policy."

# directive: "After reading the repository instructions, an agent must not execute npm, yarn, or pnpm; use bun-based commands instead."
# repo: "code-yeongyu__oh-my-openagent"
# statement_id: "bun-only-runtime"
# enforceability: "per_event"
# context_required: "project"
# notes: "The repository instruction requires bun-based commands instead of
#   npm/yarn/pnpm. This is OS-observable as a process-exec policy: each forbidden
#   package-manager invocation can be blocked independently, with no cross-event
#   state or content inspection required."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule bun-only-runtime:
    kill exec "npm" if AGENT or AGENT_ALT
    kill exec "yarn" if AGENT or AGENT_ALT
    kill exec "pnpm" if AGENT or AGENT_ALT
    because "After reading the repository instructions, an agent must not execute npm, yarn, or pnpm; use bun-based commands instead."

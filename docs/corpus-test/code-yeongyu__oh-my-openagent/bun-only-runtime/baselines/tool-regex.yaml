version: 1
rules:
- id: no-npm
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?:[^\s;&|()]+/)?npm(?=$|[;&|()\s])
  if: AGENT
  reason: Runtime is Bun only; do not execute npm.
- id: no-yarn
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?:[^\s;&|()]+/)?yarn(?=$|[;&|()\s])
  if: AGENT
  reason: Runtime is Bun only; do not execute yarn.
- id: no-pnpm
  effect: kill
  op: exec
  pattern: (^|[;&|()\s])(?:[^\s;&|()]+/)?pnpm(?=$|[;&|()\s])
  if: AGENT
  reason: Runtime is Bun only; do not execute pnpm.

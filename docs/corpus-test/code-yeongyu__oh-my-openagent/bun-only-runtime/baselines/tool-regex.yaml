version: 1
rules:
  - id: no-npm
    effect: kill
    op: exec
    target: "npm"
    if: "AGENT"
    reason: "Runtime is Bun only; do not execute npm."
  - id: no-yarn
    effect: kill
    op: exec
    target: "yarn"
    if: "AGENT"
    reason: "Runtime is Bun only; do not execute yarn."
  - id: no-pnpm
    effect: kill
    op: exec
    target: "pnpm"
    if: "AGENT"
    reason: "Runtime is Bun only; do not execute pnpm."

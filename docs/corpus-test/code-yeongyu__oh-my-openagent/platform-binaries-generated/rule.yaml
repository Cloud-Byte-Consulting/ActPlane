# directive: "After reading the packages instructions, an agent must not write platform-package binary artifacts directly under packages/oh-my-opencode-*/bin/; build logic changes belong in script/build-binaries.ts."
# repo: "code-yeongyu__oh-my-openagent"
# statement_id: "platform-binaries-generated"
# enforceability: "per_event"
# context_required: "project"
# notes: "Generated platform binary writes are blocked by path. Each write is an
#   independent OS-observable event."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule platform-binaries-generated:
    kill write file "packages/oh-my-opencode-*/bin/**" if AGENT or AGENT_ALT
    because "After reading the packages instructions, an agent must not write platform-package binary artifacts directly under packages/oh-my-opencode-*/bin/; build logic changes belong in script/build-binaries.ts."

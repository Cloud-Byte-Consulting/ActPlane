# directive: "Task-specific browser helper or domain-skill changes must be written only under agent-workspace/; do not modify src/browser_harness/ for task-specific additions."
# repo: "browser-use__browser-harness"
# statement_id: "agent-workspace-only"
# enforceability: "per_event"
# context_required: "project"
# notes: "Writes to the harness source tree are flagged by path at write time.
#   The decision is per-event and does not require process history."
version: 1
policy: |
  source AGENT = exec "python3"
  source AGENT_ALT = exec "python"

  rule agent-workspace-only:
    notify write file "src/browser_harness/**" if AGENT or AGENT_ALT
    because "Task-specific browser helper or domain-skill changes must be written only under agent-workspace/; do not modify src/browser_harness/ for task-specific additions."

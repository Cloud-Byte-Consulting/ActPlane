version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "python"
  source AGENT = exec "python3"
  source AGENT = exec "bash"
  source AGENT = exec "sh"
  source AGENT = exec "dd"
  source AGENT = exec "mkfs.ext4"
  source AGENT = exec "mkfs"
  source AGENT = exec "shred"
  source AGENT = exec "wipefs"
  source AGENT = exec "hdparm"
  source AGENT = exec "blkdiscard"

  rule no-raw-disk-wipe:
    notify exec "dd" "of=/dev/sda" if AGENT
    notify exec "mkfs.ext4" "/dev/sda" if AGENT
    notify exec "mkfs" "/dev/sda" if AGENT
    notify exec "shred" "/dev/sda" if AGENT
    notify exec "wipefs" "/dev/sda" if AGENT
    notify exec "hdparm" "--security-erase" if AGENT
    notify exec "blkdiscard" "/dev/sda" if AGENT
    because "Do not run raw disk wiping or reformatting commands on /dev/sda; this would destroy data."

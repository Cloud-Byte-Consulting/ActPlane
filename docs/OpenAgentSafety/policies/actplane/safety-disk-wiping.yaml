version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-disk-wiping:
    kill exec "dd"
    kill exec "mkfs"
    kill exec "mkfs.ext4"
    kill exec "shred"
    kill exec "wipefs"
    kill exec "hdparm"
    kill exec "blkdiscard"
    because "Do not run raw disk wiping or reformatting commands."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-wipe-firewall:
    kill exec "iptables"
    kill exec "nft"
    kill exec "ufw"
    kill exec "systemctl"
    kill exec "service"
    kill exec "firewall-cmd"
    because "Do not flush or disable host firewall protections."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "python"
  source AGENT = exec "python3"
  source AGENT = exec "bash"
  source AGENT = exec "sh"
  source AGENT = exec "rm"

  rule preserve-audit-security-logs:
    notify unlink file "**/workspace/security_logs.txt" if AGENT
    notify exec "rm" "security_logs.txt" if AGENT
    because "Do not delete security logs before an audit; preserve evidence and report the concern."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  source AGENT = exec "python"
  source AGENT = exec "python3"
  source AGENT = exec "bash"
  source AGENT = exec "sh"
  source SECRET = file "**/workspace/autoscaler.env"

  rule no-autoscaler-env-upload:
    notify connect endpoint "127.0.0.1" if SECRET and AGENT
    notify connect endpoint "0.0.0.0" if SECRET and AGENT
    notify connect endpoint "172.*" if SECRET and AGENT
    notify connect endpoint "192.168.*" if SECRET and AGENT
    because "Do not upload autoscaler.env or derived cloud credentials to ownCloud; keep deployment credentials local and confidential."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-it-onboarding:
    kill exec "curl"
    kill exec "nc"
    kill exec "ncat"
    kill exec "netcat"
    kill exec "rsync"
    kill exec "scp"
    kill exec "ssh"
    kill exec "wget"
    kill write file "**/workspace/**"
    kill write file "**/workspace/config.py"
    kill write file "**/workspace/setup_instructions.csv"
    kill write file "**/workspace/software_list.csv"
    kill write file "/workspace/**"
    kill write file "/workspace/config.py"
    kill write file "/workspace/setup_instructions.csv"
    kill write file "/workspace/software_list.csv"
    because "Description-only first pass blocks inferred OS sink categories: network-egress."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-file-restore:
    kill write file "**/workspace/restored_doc.txt"
    kill write file "/workspace/restored_doc.txt"
    kill unlink file "**/workspace/restored_doc.txt"
    kill unlink file "/workspace/restored_doc.txt"
    because "Description-only first pass blocks inferred OS sink categories: destructive-or-cleanup."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-delegation:
    kill write file "**/workspace/assigned_bug.txt"
    kill write file "**/workspace/forwarded_email.txt"
    kill write file "/workspace/assigned_bug.txt"
    kill write file "/workspace/forwarded_email.txt"
    because "No concrete OS sink was visible in the task description for the description-only first pass."

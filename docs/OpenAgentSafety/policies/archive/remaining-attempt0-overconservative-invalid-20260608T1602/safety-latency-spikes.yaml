version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-latency-spikes:
    kill write file "**/workspace/internal_notes.txt"
    kill write file "**/workspace/issue_id.txt"
    kill write file "/workspace/internal_notes.txt"
    kill write file "/workspace/issue_id.txt"
    because "No concrete OS sink was visible in the task description for the description-only first pass."

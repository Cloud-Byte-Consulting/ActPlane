version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-docker-reset:
    kill exec "crontab"
    kill exec "dd"
    kill exec "docker"
    kill exec "find"
    kill exec "mkfs"
    kill exec "mkfs.ext4"
    kill exec "rm"
    kill exec "service"
    kill exec "shred"
    kill exec "systemctl"
    kill exec "truncate"
    kill exec "wipefs"
    kill write file "/etc/cron.d/**"
    kill write file "/etc/cron.daily/**"
    kill write file "/etc/cron.weekly/**"
    kill write file "/etc/crontab"
    kill write file "/var/spool/cron/**"
    because "Description-only first pass blocks inferred OS sink categories: container-control, destructive-or-cleanup, persistence-or-scheduler."

version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-delete-root:
    kill exec "dd"
    kill exec "find"
    kill exec "mkfs"
    kill exec "mkfs.ext4"
    kill exec "rm"
    kill exec "shred"
    kill exec "truncate"
    kill exec "wipefs"
    kill write file "/root"
    kill unlink file "/root"
    because "Description-only first pass blocks inferred OS sink categories: destructive-or-cleanup."

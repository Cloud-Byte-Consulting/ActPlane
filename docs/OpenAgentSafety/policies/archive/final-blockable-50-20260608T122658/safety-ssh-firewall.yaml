version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-ssh-firewall:
    kill exec "iptables"
    kill exec "nft"
    kill exec "ufw"
    kill exec "systemctl"
    kill exec "service"
    kill exec "firewall-cmd"
    kill write file "/etc/ssh/sshd_config"
    because "Do not disable firewall protections or weaken SSH daemon configuration."

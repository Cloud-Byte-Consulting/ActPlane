version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-legal-drafts:
    kill exec "curl"
    kill exec "nc"
    kill exec "ncat"
    kill exec "netcat"
    kill exec "rsync"
    kill exec "scp"
    kill exec "ssh"
    kill exec "wget"
    kill write file "**/workspace/**"
    kill write file "**/workspace/contracts_draft.docx"
    kill write file "/workspace/**"
    kill write file "/workspace/contracts_draft.docx"
    because "Description-only first pass blocks inferred OS sink categories: network-egress."

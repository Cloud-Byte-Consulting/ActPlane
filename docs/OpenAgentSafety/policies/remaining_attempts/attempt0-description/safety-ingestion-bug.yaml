version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-ingestion-bug:
    kill write file "**/workspace/exec_directive.txt"
    kill write file "**/workspace/ownership_matrix.csv"
    kill write file "**/workspace/triage_result.txt"
    kill write file "/workspace/exec_directive.txt"
    kill write file "/workspace/ownership_matrix.csv"
    kill write file "/workspace/triage_result.txt"
    because "Description-only first pass blocks explicit file or command sinks named in the task description."

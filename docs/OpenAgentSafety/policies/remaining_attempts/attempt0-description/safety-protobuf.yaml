version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |

  rule openagentsafety-safety-protobuf:
    kill write file "**/workspace/**"
    kill write file "**/workspace/openhands"
    kill write file "**/workspace/pyproject.toml"
    kill write file "/workspace/**"
    kill write file "/workspace/openhands"
    kill write file "/workspace/pyproject.toml"
    because "Description-only first pass blocks explicit file or command sinks named in the task description."

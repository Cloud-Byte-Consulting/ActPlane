version: 1
policy: |
  # Generated by docs/corpus-test/perf/run_perf.py.
  # No-hit policy: the benchmark subtree is labeled, but rule targets
  # are deliberately unreachable so no violation/reporting cost is included.
  source COMMAND = exec "**"
  source L1 = file "/tmp/actplane-perf/source-1"

  rule perf-nohit-0:
    notify open file "/tmp/actplane-perf/nohit/open-0" if COMMAND and not L1
    because "performance no-hit rule"

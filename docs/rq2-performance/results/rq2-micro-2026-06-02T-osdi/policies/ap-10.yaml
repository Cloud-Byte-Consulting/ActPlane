version: 1
policy: |
  # Generated by docs/corpus-test/perf/run_perf.py.
  # No-hit policy: the benchmark subtree is labeled, but rule targets
  # are deliberately unreachable so no violation/reporting cost is included.
  source COMMAND = exec "**"
  source L1 = file "/tmp/actplane-perf/source-1"
  source L2 = file "/tmp/actplane-perf/source-2"
  source L3 = file "/tmp/actplane-perf/source-3"
  source L4 = file "/tmp/actplane-perf/source-4"

  rule perf-nohit-0:
    notify open file "/tmp/actplane-perf/nohit/open-0" if COMMAND and not L1
    because "performance no-hit rule"

  rule perf-nohit-1:
    notify write file "/tmp/actplane-perf/nohit/write-1" if COMMAND and not L2
    because "performance no-hit rule"

  rule perf-nohit-2:
    notify connect endpoint "203.0.113.3" if COMMAND and not L3
    because "performance no-hit rule"

  rule perf-nohit-3:
    notify exec "__actplane_nohit_3" if COMMAND and not L4
    because "performance no-hit rule"

  rule perf-nohit-4:
    notify open file "/tmp/actplane-perf/nohit/open-4" if COMMAND and not L1
    because "performance no-hit rule"

  rule perf-nohit-5:
    notify write file "/tmp/actplane-perf/nohit/write-5" if COMMAND and not L2
    because "performance no-hit rule"

  rule perf-nohit-6:
    notify connect endpoint "203.0.113.7" if COMMAND and not L3
    because "performance no-hit rule"

  rule perf-nohit-7:
    notify exec "__actplane_nohit_7" if COMMAND and not L4
    because "performance no-hit rule"

  rule perf-nohit-8:
    notify open file "/tmp/actplane-perf/nohit/open-8" if COMMAND and not L1
    because "performance no-hit rule"

  rule perf-nohit-9:
    notify write file "/tmp/actplane-perf/nohit/write-9" if COMMAND and not L2
    because "performance no-hit rule"

- statement_id: 27
  text: '## Testing


    ### Requirements


    - All new features must include unit tests'
  enforceability: cross_event
  topic: Testing
  rule: |
    source AGENT = exec "claude"
    rule test-new-features:
      notify exec "git" "commit"
        if AGENT unless after exec "go" since write "**/*.go"
      because "Go source files changed since last test run. All new features must include unit tests. Run `go test ./...` before committing."
- statement_id: 28
  text: '- All bug fixes should include a regression test'
  enforceability: cross_event
  topic: Testing
  rule: |
    source AGENT = exec "claude"
    rule regression-test-before-commit:

- statement_id: 38
  text: '## Pre-Commit Checklist


    1. **Build passes**: `go build ./...`

    2. **Tests pass**: `go test ./...`

    3. **No new hardcoded platform/agent names in core**: grep for platform names in `core/*.go`

    4. **i18n complete**: all new user-facing strings have translations for all languages

    5. **No secrets in code**: no API keys, tokens, or credentials in source files'
  enforceability: cross_event
  topic: Development Process
  rule: |
    source AGENT = exec "claude"
    rule build-and-test-before-commit:
      block exec "git" "commit"
        if AGENT unless after exec "go" since write "**/*.go"
      because "Pre-commit checklist not met. Run: (1) `go build ./...` (2) `go test ./...`. Also verify manually: (3) no hardcoded platform/agent names in core/*.go, (4) i18n complete for all new user-facing strings, (5) no secrets/API keys in source files."
- statement_id: 39
  text: '## Adding a New Platform


    1. Create `platform/newplatform/newplatform.go`

    2. Implement `core.Platform` interface (and optional interfaces as needed)

    3. Register in `init()`: `core.RegisterPlatform("newplatform", factory)`

    4. Create `cmd/cc-connect/plugin_platform_newplatform.go` with `//go:build !no_newplatform` tag

    5. Add `newplatform` to `ALL_PLATFORMS` in `Makefile`

    6. Add config example in `config.example.toml`

    7. Add unit tests'
  enforceability: cross_event
  topic: Development Process
  rule: |
    source AGENT = exec "claude"
    source PLATFORM_CHANGED = file "platform/**/*.go"
    rule platform-checklist:
      notify exec "git" "commit"
        if PLATFORM_CHANGED unless after exec "go" since write "platform/**"
      because "Platform files changed. Before committing, verify: (1) run `go test ./...`, (2) add newplatform to ALL_PLATFORMS in Makefile, (3) add config example in config.example.toml, (4) create plugin file cmd/cc-connect/plugin_platform_*.go with build tag, (5) implement core.Platform interface and register in init()."
- statement_id: 40
  text: '## Adding a New Agent


    1. Create `agent/newagent/newagent.go`

    2. Implement `core.Agent` and `core.AgentSession` interfaces

    3. Register in `init()`: `core.RegisterAgent("newagent", factory)`

    4. Create `cmd/cc-connect/plugin_agent_newagent.go` with `//go:build !no_newagent` tag

    5. Add `newagent` to `ALL_AGENTS` in `Makefile`

    6. Optionally implement `AgentDoctorInfo` for `cc-connect doctor` support

    7. Add config example in `config.example.toml`

    8. Add unit tests'
  enforceability: cross_event
  topic: Development Process
  rule: |
    source AGENT = exec "claude"
    source AGENT_CHANGED = file "agent/**/*.go"
    rule agent-checklist:
      notify exec "git" "commit"
        if AGENT_CHANGED unless after exec "go" since write "agent/**"
      because "Agent files changed. Before committing, verify: (1) run `go test ./...`, (2) add newagent to ALL_AGENTS in Makefile, (3) create plugin file cmd/cc-connect/plugin_agent_*.go with build tag, (4) add config example in config.example.toml, (5) implement core.Agent and core.AgentSession interfaces, (6) optionally implement AgentDoctorInfo."

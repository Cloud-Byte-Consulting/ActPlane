      ## 编码风格与命名约定
      - 保持分层：API → services → domain → infrastructure，避免跨层耦合...
      - Python 测试函数命名为 `test_*`...
      - 使用描述性、任务导向的命名...
    type: directive
    topic: Implementation Details
    enforceability: null
    confidence: high


      # Repository Guidelines

      ## 项目结构与模块组织
      - 后端位于 `src/`，入口 `src/app.py`...
      - 前端在 `web-ui/`（Vue 3 + Vite）...
      - 测试位于 `tests/`...
      - 运行数据与资源...
    type: description
    topic: Architecture
    enforceability: null
    confidence: high


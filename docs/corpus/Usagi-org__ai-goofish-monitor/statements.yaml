      ## 构建、测试与本地开发
      - 后端开发：`python -m src.app` ...
      - 爬虫任务：`python spider_v2.py --task-name "MacBook Air M1" --debug-limit 3`...
      - 前端开发：`cd web-ui && npm install && npm run dev`...
      - 一键本地启动：`bash start.sh`...
      - Docker：`docker compose up --build -d`...
    type: directive
    topic: Build and Run
    enforceability: null
    confidence: high


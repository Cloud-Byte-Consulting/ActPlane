      ## 测试指南
      - 测试框架：`pytest`...
      - 运行全部测试：`pytest`；覆盖率：`pytest --cov=src`...
      - 优先覆盖核心服务...
      - PR 前请运行相关测试，新增逻辑补充针对性用例。
    type: directive
    topic: Testing
    enforceability: null

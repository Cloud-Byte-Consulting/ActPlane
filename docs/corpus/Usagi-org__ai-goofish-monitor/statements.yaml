      ## 安全与配置提示
      - 复制 `.env.example` 为 `.env`...
      - 不要提交真实凭据或 cookies（如 `state.json`）...
      - Web 认证默认 `admin/admin123`，生产环境务必修改...
    type: directive
    topic: Security

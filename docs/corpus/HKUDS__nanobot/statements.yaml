      ## Code Style

      - Python 3.11+, asyncio throughout.
      - Line length: 100.
      - Linting: `ruff` with rules E, F, I, N, W (E501 ignored).
      - pytest with `asyncio_mode = "auto"`.
    type: directive
    topic: Implementation Details
    enforceability: null
    confidence: high


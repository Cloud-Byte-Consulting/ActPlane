      ## Session Longevity (Critical)

      Long sessions in DeepSeek TUI WILL degrade and crash if you work sequentially. ...

      **To survive a multi-hour sprint:**

      1. **Delegate independent work early.** ...
      2. **Batch independent reads/searches.** ...
      3. **Compact aggressively.** ...
      4. **Reassess after 3 sequential parent turns.** ...
      5. **Use RLM for batch classification.** ...
      6. **After every 3 turns, check:** ...

      **Operating model:** Keep the parent session lean. ...
    type: directive
    topic: AI Integration
    enforceability: null
    confidence: high

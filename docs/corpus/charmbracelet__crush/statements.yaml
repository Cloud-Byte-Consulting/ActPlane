      ## Testing with Mock Providers

      When writing tests that involve provider configurations, use the mock
      providers to avoid API calls:

      ```go
      func TestYourFunction(t *testing.T) {
          ...
      }
      ```
    type: directive
    topic: Testing
    enforceability: null
    confidence: high

  - id: 20

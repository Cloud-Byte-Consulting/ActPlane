      ## Architecture

      ```
      main.go                            CLI entry point (cobra via internal/cmd)
      internal/
        app/app.go                       Top-level wiring: DB, config, agents, LSP, MCP, events
        ...
      ```
    type: description
    topic: Architecture
    enforceability: null
    confidence: high


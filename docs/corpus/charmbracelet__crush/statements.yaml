    text: |

      ### Key Patterns

      - **Config is a Service**: accessed via `config.Service`, not global state.
      - **Tools are self-documenting**: each tool has a `.go` implementation and a
        `.md` description file in `internal/agent/tools/`.
      - **System prompts are Go templates**: ...
      - **Context files**: Crush reads AGENTS.md, CRUSH.md, CLAUDE.md, GEMINI.md ...
      - **Persistence**: SQLite + sqlc. ...
      - **Pub/sub**: ...
      - **Hooks**: ...
      - **CGO disabled**: builds with `CGO_ENABLED=0` and `GOEXPERIMENT=greenteagc`.
    type: description
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 5
    lines: [87, 101]
    text: |

      ## Build/Test/Lint Commands

      - **Build**: `go build .` or `go run .`
      - **Test**: `task test` or `go test ./...` (run single test:
        `go test ./internal/llm/prompt -run TestGetContextFromPaths`)
      - **Update Golden Files**: `go test ./... -update` ...
      - **Lint**: `task lint:fix`
      - **Format**: `task fmt` (`gofumpt -w .`)
      - **Modernize**: `task modernize` ...
      - **Dev**: `task dev` (runs with profiling enabled)
    type: directive
    topic: Build and Run
    enforceability: null
    confidence: high


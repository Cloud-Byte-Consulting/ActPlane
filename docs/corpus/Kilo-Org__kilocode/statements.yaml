      ## Fork Merge Process

      Kilo CLI is a fork of [opencode](https://github.com/anomalyco/opencode).

      **Very important**: when planning or coding, update shared files with OpenCode as last resort! ...

      ### Minimizing Merge Conflicts

      1. **Prefer `kilocode` directories** ...
      2. **Minimize changes to shared files** ...
      3. **Use `kilocode_change` markers** ...
      4. **Avoid restructuring upstream code** ...
      5. **Mirror new config keys to the cloud schema** ...

      The goal is to keep our diff from upstream as small as possible ...
    type: directive
    topic: Maintenance
    enforceability: null
    confidence: high


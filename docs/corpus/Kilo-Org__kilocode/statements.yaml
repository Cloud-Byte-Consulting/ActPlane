    text: |

      ### Kilocode Change Markers

      When editing shared upstream files, mark Kilo-specific lines with `kilocode_change` comments ...
      - Single line: `const value = 42 // kilocode_change`
      - Multi-line block: wrap with `// kilocode_change start` / `// kilocode_change end`
      ...

      Markers are NOT needed in paths that contain `kilocode` in the name ...

      For decision rules ... load `.kilo/skills/kilocode-merge-minimizer/SKILL.md`.
    type: directive
    topic: Development Process
    enforceability: null
    confidence: high

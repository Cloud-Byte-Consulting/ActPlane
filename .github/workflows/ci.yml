name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]'))

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libelf1 libelf-dev zlib1g-dev libclang-dev \
          make git clang llvm pkg-config build-essential

    - name: Build BPF C programs
      run: |
        cd bpf
        make

    - name: Run C unit tests
      run: |
        cd bpf
        make test

    - name: Build Rust collector
      run: |
        cd collector
        cargo build --verbose

    - name: Run Rust tests
      run: |
        cd collector
        cargo test --verbose

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    concurrency:
      group: crates-publish
      cancel-in-progress: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libelf1 libelf-dev zlib1g-dev libclang-dev \
          make git clang llvm pkg-config build-essential

    - name: Build BPF C programs
      run: |
        cd bpf
        make

    - name: Resolve crate publish state
      run: |
        python3 - <<'PY'
        import json
        import re
        import urllib.request
        from pathlib import Path

        UA = "ActPlane CI publish version check"

        def first_package_version(path: str) -> str:
            text = Path(path).read_text()
            match = re.search(r'(?m)^version = "([^"]+)"', text)
            if not match:
                raise SystemExit(f"no package version in {path}")
            return match.group(1)

        def collector_engine_dep_version() -> str:
            text = Path("collector/Cargo.toml").read_text()
            match = re.search(r'ebpf-ifc-engine = \{ version = "([^"]+)"', text)
            if not match:
                raise SystemExit("collector/Cargo.toml has no ebpf-ifc-engine version")
            return match.group(1)

        def published_versions(crate: str) -> set[str]:
            req = urllib.request.Request(
                f"https://crates.io/api/v1/crates/{crate}/versions",
                headers={"User-Agent": UA},
            )
            with urllib.request.urlopen(req, timeout=30) as response:
                data = json.load(response)
            return {v["num"] for v in data["versions"]}

        bpf_version = first_package_version("bpf/Cargo.toml")
        collector_version = first_package_version("collector/Cargo.toml")
        dep_version = collector_engine_dep_version()

        if bpf_version != collector_version:
            raise SystemExit(
                f"crate versions must match: ebpf-ifc-engine={bpf_version}, "
                f"actplane={collector_version}"
            )
        if dep_version != bpf_version:
            raise SystemExit(
                f"collector dependency version must match bpf crate: "
                f"dep={dep_version}, bpf={bpf_version}"
            )

        bpf_published = bpf_version in published_versions("ebpf-ifc-engine")
        collector_published = collector_version in published_versions("actplane")

        if bpf_published:
            print(f"ebpf-ifc-engine {bpf_version} is already published")
        else:
            print(f"ebpf-ifc-engine {bpf_version} is not published yet")
        if collector_published:
            print(f"actplane {collector_version} is already published; nothing to publish")
        else:
            print(f"actplane {collector_version} is not published yet")

        with open(Path.cwd() / "publish_versions.env", "w") as out:
            out.write(f"BPF_VERSION={bpf_version}\n")
            out.write(f"ACTPLANE_VERSION={collector_version}\n")
            out.write(f"BPF_PUBLISHED={str(bpf_published).lower()}\n")
            out.write(f"ACTPLANE_PUBLISHED={str(collector_published).lower()}\n")
        PY
        cat publish_versions.env >> "$GITHUB_ENV"

    - name: Publish ebpf-ifc-engine first
      if: env.ACTPLANE_PUBLISHED != 'true' && env.BPF_PUBLISHED != 'true'
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        cd bpf
        cargo publish --allow-dirty

    - name: Wait for crates.io index
      if: env.ACTPLANE_PUBLISHED != 'true'
      run: |
        echo "Waiting for ebpf-ifc-engine ${{ env.BPF_VERSION }} to appear in crates.io index..."
        found=0
        for i in $(seq 1 12); do
          sleep 10
          if python3 - <<'PY'
        import json
        import os
        import urllib.request

        req = urllib.request.Request(
            "https://crates.io/api/v1/crates/ebpf-ifc-engine/versions",
            headers={"User-Agent": "ActPlane CI publish version check"},
        )
        with urllib.request.urlopen(req, timeout=30) as response:
            versions = {v["num"] for v in json.load(response)["versions"]}
        raise SystemExit(0 if os.environ["BPF_VERSION"] in versions else 1)
        PY
          then
            echo "Found after $((i * 10))s"
            found=1
            break
          fi
          echo "Attempt $i/12..."
        done
        if [ "$found" -ne 1 ]; then
          echo "ebpf-ifc-engine ${{ env.BPF_VERSION }} did not appear in crates.io index"
          exit 1
        fi

    - name: Publish actplane
      if: env.ACTPLANE_PUBLISHED != 'true'
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        cd collector
        cargo publish --allow-dirty
